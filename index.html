<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      display: flex; justify-content: center; padding: 40px 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container { width: 100%; max-width: 520px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 24px; }
    .add-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .add-row input {
      flex: 1; padding: 14px 18px; border-radius: 14px; border: 1px solid #e5e5ea;
      font-size: 16px; background: #fff; outline: none;
    }
    .add-row input:focus { border-color: #007aff; }
    .add-row button {
      padding: 14px 22px; border-radius: 14px; border: none;
      background: #007aff; color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .add-row button:active { opacity: .7; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button {
      padding: 8px 18px; border-radius: 20px; border: 1px solid #e5e5ea;
      background: #fff; font-size: 14px; cursor: pointer;
    }
    .filters button.active { background: #007aff; color: #fff; border-color: #007aff; }
    .todo { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #fff; border-radius: 14px; margin-bottom: 8px; }
    .todo .check {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid #c7c7cc;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 14px; transition: .15s;
    }
    .todo .check.done { background: #007aff; border-color: #007aff; color: #fff; }
    .todo .title { flex: 1; font-size: 16px; }
    .todo .title.done { text-decoration: line-through; color: #aeaeb2; }
    .todo .del {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: transparent; font-size: 18px; cursor: pointer; color: #ff3b30;
      display: flex; align-items: center; justify-content: center;
    }
    .todo .del:active { background: #f2f2f7; }
    .empty { text-align: center; color: #aeaeb2; padding: 40px 0; font-size: 15px; }
    .status { font-size: 12px; color: #aeaeb2; margin-top: 16px; text-align: center; }
    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #f5f5f7; }
      .add-row input { background: #1c1c1e; border-color: #38383a; color: #f5f5f7; }
      .filters button { background: #1c1c1e; border-color: #38383a; color: #f5f5f7; }
      .todo { background: #1c1c1e; }
      .todo .check { border-color: #48484a; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo</h1>
    <div class="add-row">
      <input id="input" placeholder="Add a todo..." autofocus>
      <button onclick="addTodo()">Add</button>
    </div>
    <div class="filters">
      <button class="active" data-filter="all" onclick="setFilter('all')">All</button>
      <button data-filter="active" onclick="setFilter('active')">Active</button>
      <button data-filter="completed" onclick="setFilter('completed')">Completed</button>
    </div>
    <div id="list"></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const API = '/api/todos';
    let filter = 'all';

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
      return res.json();
    }

    async function load() {
      const { data } = await api(`?filter=${filter}`);
      const list = document.getElementById('list');
      if (data.length === 0) {
        list.innerHTML = '<div class="empty">No todos yet</div>';
      } else {
        list.innerHTML = data.map(t => `
          <div class="todo">
            <div class="check ${t.completed ? 'done' : ''}" onclick="toggle(${t.id}, ${t.completed})">${t.completed ? '✓' : ''}</div>
            <div class="title ${t.completed ? 'done' : ''}">${esc(t.title)}</div>
            <button class="del" onclick="del(${t.id})">✕</button>
          </div>
        `).join('');
      }
      const { data: all } = await api('?filter=all');
      document.getElementById('status').textContent = `${all.length} total · ${all.filter(t => !t.completed).length} active`;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function addTodo() {
      const input = document.getElementById('input');
      const title = input.value.trim();
      if (!title) return;
      input.value = '';
      await api('', { method: 'POST', body: JSON.stringify({ title }) });
      load();
    }

    async function toggle(id, completed) {
      await api(`/${id}`, { method: 'PUT', body: JSON.stringify({ completed: completed ? 0 : 1 }) });
      load();
    }

    async function del(id) {
      await api(`/${id}`, { method: 'DELETE' });
      load();
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      load();
    }

    document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    load();
  </script>
</body>
</html>
