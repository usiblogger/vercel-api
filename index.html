<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #f2f2f7; color: #1d1d1f; -webkit-font-smoothing: antialiased; }

    .nav { display: flex; align-items: center; gap: 4px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 10; }
    .nav .brand { font-weight: 700; font-size: 18px; }
    .nav button { padding: 8px 16px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; color: #007aff; }
    .nav button.active { background: #007aff; color: #fff; }
    .nav .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .nav .badge { background: #ff3b30; color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .nav .cashier-name { font-size: 13px; color: #aeaeb2; margin-left: 12px; }

    .view { display: none; }
    .view.active { display: block; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
    .login-box { background: #fff; border-radius: 24px; padding: 32px; width: 100%; max-width: 320px; text-align: center; }
    .login-box h2 { margin-bottom: 4px; }
    .login-box p { color: #aeaeb2; font-size: 14px; margin-bottom: 20px; }
    .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
    .pin-dots .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #c7c7cc; }
    .pin-dots .dot.filled { background: #007aff; border-color: #007aff; }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
    .pin-pad button { padding: 18px; border-radius: 14px; border: none; background: #f2f2f7; font-size: 22px; font-weight: 600; cursor: pointer; }
    .pin-pad button:active { background: #e5e5ea; }
    .pin-pad .empty { background: transparent; pointer-events: none; }
    .login-error { color: #ff3b30; font-size: 13px; margin-top: 12px; }

    /* POS layout */
    .pos-layout { display: flex; height: calc(100vh - 53px); }
    .pos-products { flex: 1; overflow-y: auto; padding: 12px; }
    .pos-cart { width: 360px; background: #fff; border-left: 1px solid #e5e5ea; display: flex; flex-direction: column; }
    @media (max-width: 768px) { .pos-layout { flex-direction: column; } .pos-cart { width: 100%; border-left: none; border-top: 1px solid #e5e5ea; height: 50vh; } }

    .search-bar { margin-bottom: 12px; }
    .search-bar input { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid #e5e5ea; font-size: 15px; outline: none; background: #fff; }
    .search-bar input:focus { border-color: #007aff; }

    .cat-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
    .cat-row button { padding: 6px 14px; border-radius: 16px; border: 1px solid #e5e5ea; background: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .cat-row button.active { background: #007aff; color: #fff; border-color: #007aff; }

    .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    .prod-card {
      background: #fff; border-radius: 14px; padding: 12px; cursor: pointer; text-align: center;
      transition: .1s; border: 2px solid transparent;
    }
    .prod-card:active { transform: scale(.96); }
    .prod-card .img { width: 100%; aspect-ratio: 1; background: #f2f2f7; border-radius: 10px; margin-bottom: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #aeaeb2; }
    .prod-card .img img { width: 100%; height: 100%; object-fit: cover; }
    .prod-card .name { font-size: 13px; font-weight: 600; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prod-card .price { font-size: 15px; font-weight: 700; color: #007aff; }
    .prod-card .cat { font-size: 11px; color: #aeaeb2; }

    .cart-header { padding: 16px; font-weight: 700; font-size: 16px; border-bottom: 1px solid #e5e5ea; display: flex; justify-content: space-between; align-items: center; }
    .cart-header button { border: none; background: none; color: #ff3b30; font-size: 13px; cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .cart-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f2f2f7; }
    .cart-item .ci-name { flex: 1; font-size: 14px; }
    .cart-item .ci-price { font-size: 14px; font-weight: 600; min-width: 60px; text-align: right; }
    .cart-item .ci-qty { display: flex; align-items: center; gap: 6px; }
    .cart-item .ci-qty button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #e5e5ea; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cart-item .ci-qty span { min-width: 20px; text-align: center; font-size: 14px; font-weight: 600; }
    .cart-empty { padding: 40px 16px; text-align: center; color: #aeaeb2; font-size: 14px; }

    .cart-footer { padding: 16px; border-top: 1px solid #e5e5ea; }
    .cart-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; margin-bottom: 12px; }
    .pay-row { display: flex; gap: 6px; }
    .pay-row button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .pay-cash { background: #34c759; color: #fff; }
    .pay-card { background: #007aff; color: #fff; }

    /* Orders */
    .orders-list { max-width: 700px; margin: 0 auto; padding: 16px; }
    .order-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 8px; }
    .order-card .o-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .order-card .o-total { font-size: 20px; font-weight: 800; color: #007aff; }
    .order-card .o-items { font-size: 13px; color: #aeaeb2; }
    .order-card .o-del { border: none; background: none; color: #ff3b30; cursor: pointer; font-size: 13px; }

    /* Dashboard */
    .dash { max-width: 700px; margin: 0 auto; padding: 16px; }
    .dash-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .dash-card { background: #fff; border-radius: 14px; padding: 20px; text-align: center; }
    .dash-card .num { font-size: 32px; font-weight: 800; color: #007aff; }
    .dash-card .label { font-size: 13px; color: #aeaeb2; margin-top: 4px; }
    .dash h3 { margin-bottom: 12px; }

    /* Products mgmt */
    .mgmt-bar { display: flex; gap: 8px; padding: 12px; max-width: 700px; margin: 0 auto; }
    .mgmt-bar button { padding: 8px 16px; border-radius: 10px; border: none; background: #007aff; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
    .mgmt-bar button.danger { background: #ff3b30; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 24px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; }
    .modal input, .modal select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #e5e5ea; font-size: 15px; margin-bottom: 10px; outline: none; }
    .modal input:focus { border-color: #007aff; }
    .modal .upload-btn { display: block; width: 100%; padding: 10px; border-radius: 12px; border: 1px dashed #c7c7cc; background: #fafafa; font-size: 14px; cursor: pointer; text-align: center; margin-bottom: 10px; color: #007aff; }
    .modal .preview { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; margin-bottom: 10px; display: none; }
    .modal .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
    .modal .modal-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal .modal-actions .btn-primary { background: #007aff; color: #fff; }
    .modal .modal-actions .btn-secondary { background: #f2f2f7; color: #1d1d1f; }
    .modal .modal-actions .btn-danger { background: #ff3b30; color: #fff; }

    /* Tutorial */
    .tut-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .tut-overlay.show { display: flex; }
    .tut-box { background: #fff; border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; }
    .tut-box .step-icon { font-size: 48px; margin-bottom: 12px; }
    .tut-box h3 { margin-bottom: 8px; }
    .tut-box p { font-size: 14px; color: #aeaeb2; margin-bottom: 20px; line-height: 1.5; }
    .tut-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
    .tut-dots span { width: 8px; height: 8px; border-radius: 50%; background: #e5e5ea; }
    .tut-dots span.active { background: #007aff; width: 24px; border-radius: 4px; }
    .tut-box .tut-btn { padding: 12px 32px; border-radius: 14px; border: none; background: #007aff; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    .tut-box .tut-skip { display: block; margin-top: 12px; border: none; background: none; color: #aeaeb2; font-size: 13px; cursor: pointer; }

    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #f5f5f7; }
      .nav { background: #1c1c1e; border-color: #38383a; }
      .nav button { color: #0a84ff; }
      .nav button.active { background: #0a84ff; color: #fff; }
      .login-box { background: #1c1c1e; }
      .pin-pad button { background: #2c2c2e; color: #f5f5f7; }
      .search-bar input { background: #1c1c1e; border-color: #38383a; color: #f5f5f7; }
      .cat-row button { background: #1c1c1e; border-color: #38383a; color: #f5f5f7; }
      .cat-row button.active { background: #0a84ff; border-color: #0a84ff; }
      .prod-card { background: #1c1c1e; }
      .prod-card .img { background: #2c2c2e; }
      .pos-cart { background: #1c1c1e; border-color: #38383a; }
      .cart-header, .cart-footer { border-color: #38383a; }
      .cart-item { border-color: #2c2c2e; }
      .cart-item .ci-qty button { background: #2c2c2e; border-color: #38383a; color: #f5f5f7; }
      .order-card { background: #1c1c1e; }
      .dash-card { background: #1c1c1e; }
      .modal { background: #1c1c1e; }
      .modal input { background: #2c2c2e; border-color: #38383a; color: #f5f5f7; }
      .modal .upload-btn { background: #2c2c2e; border-color: #38383a; }
      .modal .modal-actions .btn-secondary { background: #2c2c2e; color: #f5f5f7; }
      .tut-box { background: #1c1c1e; }
    }
  </style>
</head>
<body>

<div class="nav" id="navBar" style="display:none;">
  <span class="brand">POS</span>
  <button class="active" onclick="showView('pos')" id="navPos">Sell</button>
  <button onclick="showView('orders')" id="navOrders">Orders <span class="badge" id="orderBadge">0</span></button>
  <button onclick="showView('dashboard')" id="navDash">Dashboard</button>
  <div class="right">
    <button onclick="showView('products')" id="navProducts">Products</button>
    <span class="cashier-name" id="cashierName"></span>
    <button onclick="logout()" style="color:#ff3b30;">Logout</button>
  </div>
</div>

<!-- Login Screen -->
<div class="view active" id="viewLogin">
  <div class="login-screen">
    <div class="login-box">
      <div style="font-size:40px;margin-bottom:12px;">🔐</div>
      <h2>Cashier Login</h2>
      <p>Enter your PIN to start selling</p>
      <div class="pin-dots" id="pinDots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
      <div class="pin-pad" id="pinPad">
        <button onclick="pinPress('1')">1</button>
        <button onclick="pinPress('2')">2</button>
        <button onclick="pinPress('3')">3</button>
        <button onclick="pinPress('4')">4</button>
        <button onclick="pinPress('5')">5</button>
        <button onclick="pinPress('6')">6</button>
        <button onclick="pinPress('7')">7</button>
        <button onclick="pinPress('8')">8</button>
        <button onclick="pinPress('9')">9</button>
        <button class="empty"></button>
        <button onclick="pinPress('0')">0</button>
        <button onclick="pinBack()">⌫</button>
      </div>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- Tutorial -->
<div class="tut-overlay" id="tutOverlay">
  <div class="tut-box">
    <div class="step-icon" id="tutIcon">🛒</div>
    <h3 id="tutTitle">Welcome to POS!</h3>
    <p id="tutDesc">Tap a product to add it to the cart. Adjust quantity with + / −, then tap Cash or Card to complete the sale.</p>
    <div class="tut-dots" id="tutDots">
      <span class="active"></span><span></span><span></span><span></span>
    </div>
    <button class="tut-btn" id="tutBtn" onclick="tutNext()">Next</button>
    <button class="tut-skip" onclick="tutDone()">Skip tutorial</button>
  </div>
</div>

<!-- POS View -->
<div class="view" id="viewPos">
  <div class="pos-layout">
    <div class="pos-products">
      <div class="search-bar">
        <input id="prodSearch" placeholder="Search products..." oninput="renderProducts()">
      </div>
      <div class="cat-row" id="catRow"></div>
      <div class="prod-grid" id="prodGrid"></div>
    </div>
    <div class="pos-cart">
      <div class="cart-header">
        <span>Cart</span>
        <button onclick="clearCart()">Clear</button>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty">Tap products to add</div>
      </div>
      <div class="cart-footer">
        <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
        <div class="pay-row">
          <button class="pay-cash" onclick="checkout('cash')">Cash</button>
          <button class="pay-card" onclick="checkout('card')">Card</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Orders View -->
<div class="view" id="viewOrders">
  <div class="orders-list" id="ordersList"></div>
</div>

<!-- Dashboard View -->
<div class="view" id="viewDashboard">
  <div class="dash">
    <div class="dash-cards">
      <div class="dash-card"><div class="num" id="dashSales">$0</div><div class="label">Total Sales</div></div>
      <div class="dash-card"><div class="num" id="dashOrders">0</div><div class="label">Orders</div></div>
    </div>
    <h3>Recent Orders</h3>
    <div id="dashRecent"></div>
  </div>
</div>

<!-- Products Management View -->
<div class="view" id="viewProducts">
  <div class="mgmt-bar">
    <button onclick="showProductModal()">+ Add Product</button>
    <button onclick="showCashierModal()">+ Cashier</button>
    <button class="danger" onclick="showCashierList()">Cashiers</button>
  </div>
  <div class="orders-list" id="prodMgmtList"></div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <h3 id="modalTitle">Add Product</h3>
    <input id="prodName" placeholder="Product name">
    <input id="prodPrice" placeholder="Price" type="number" step="0.01">
    <input id="prodCategory" placeholder="Category (e.g. Food, Drink)">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
      <input id="prodImage" placeholder="Image URL (or upload)" style="flex:1;margin-bottom:0;">
      <label class="upload-btn" style="padding:12px 16px;width:auto;margin-bottom:0;flex-shrink:0;">Upload<input type="file" hidden onchange="uploadProductImage(this)"></label>
    </div>
    <img class="preview" id="imagePreview">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeProductModal()">Cancel</button>
      <button class="btn-primary" id="modalSaveBtn" onclick="saveProduct()">Save</button>
    </div>
  </div>
</div>

<!-- Cashier Modal -->
<div class="modal-overlay" id="cashierModal">
  <div class="modal">
    <h3 id="cashierModalTitle">Add Cashier</h3>
    <input id="cashierName" placeholder="Cashier name">
    <input id="cashierPin" placeholder="PIN (4 digits)" type="number" maxlength="4">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCashierModal()">Cancel</button>
      <button class="btn-primary" onclick="saveCashier()">Save</button>
    </div>
  </div>
</div>

<!-- Cashier List Modal -->
<div class="modal-overlay" id="cashierListModal">
  <div class="modal">
    <h3>Cashiers</h3>
    <div id="cashierListBody"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="document.getElementById('cashierListModal').classList.remove('show')">Close</button>
    </div>
  </div>
</div>

<script>
  let products = [];
  let orders = [];
  let cart = [];
  let category = 'all';
  let editingProductId = null;
  let currentCashier = null;

  // Tutorial steps
  const tutSteps = [
    { icon: '🛒', title: 'Sell Products', desc: 'Tap a product in the grid to add it to the cart. Use + and − to adjust quantity.' },
    { icon: '💰', title: 'Checkout', desc: 'Tap Cash or Card to complete the sale. The order is saved automatically.' },
    { icon: '📋', title: 'Orders & Dashboard', desc: 'View past orders and see total sales on the Dashboard tab.' },
    { icon: '📸', title: 'Upload Images', desc: 'When adding or editing a product, tap "Upload" to add a product photo.' },
  ];
  let tutStep = 0;

  // --- Login ---
  let pin = '';

  function pinPress(d) {
    if (pin.length >= 4) return;
    pin += d;
    updatePinDots();
    if (pin.length === 4) login();
  }

  function pinBack() {
    pin = pin.slice(0, -1);
    updatePinDots();
    document.getElementById('loginError').textContent = '';
  }

  function updatePinDots() {
    document.querySelectorAll('#pinDots .dot').forEach((d, i) => d.classList.toggle('filled', i < pin.length));
  }

  async function login() {
    try {
      const { data } = await api('POST', '/api/pos/login', { pin });
      currentCashier = data;
      document.getElementById('cashierName').textContent = data.name;
      document.getElementById('navBar').style.display = 'flex';
      document.getElementById('viewLogin').classList.remove('active');
      document.getElementById('viewPos').classList.add('active');
      init();
    } catch (e) {
      document.getElementById('loginError').textContent = 'Wrong PIN. Try 1234';
      pin = '';
      updatePinDots();
    }
  }

  function logout() {
    currentCashier = null;
    pin = '';
    cart = [];
    document.getElementById('navBar').style.display = 'none';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('viewLogin').classList.add('active');
    updatePinDots();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const res = await fetch(path, opts);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
    return res.json();
  }

  // --- Tutorial ---
  function showTutorial() {
    if (localStorage.getItem('pos_tutorial_done')) return;
    tutStep = 0;
    tutRender();
    document.getElementById('tutOverlay').classList.add('show');
  }

  function tutRender() {
    const s = tutSteps[tutStep];
    document.getElementById('tutIcon').textContent = s.icon;
    document.getElementById('tutTitle').textContent = s.title;
    document.getElementById('tutDesc').textContent = s.desc;
    document.getElementById('tutBtn').textContent = tutStep < tutSteps.length - 1 ? 'Next' : 'Got it!';
    document.getElementById('tutDots').innerHTML = tutSteps.map((_, i) => `<span class="${i === tutStep ? 'active' : ''}"></span>`).join('');
  }

  function tutNext() {
    tutStep++;
    if (tutStep >= tutSteps.length) return tutDone();
    tutRender();
  }

  function tutDone() {
    localStorage.setItem('pos_tutorial_done', '1');
    document.getElementById('tutOverlay').classList.remove('show');
  }

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('nav' + name.charAt(0).toUpperCase() + name.slice(1));
    if (btn) btn.classList.add('active');
    if (name === 'orders') loadOrders();
    if (name === 'dashboard') loadDashboard();
    if (name === 'products') loadProductsMgmt();
  }

  // --- Products ---
  async function loadProducts() {
    const { data } = await api('GET', '/api/pos/products');
    products = data || [];
    renderCategories();
    renderProducts();
    renderProductsMgmt();
  }

  function renderCategories() {
    const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
    document.getElementById('catRow').innerHTML =
      `<button class="${category === 'all' ? 'active' : ''}" onclick="setCategory('all')">All</button>` +
      cats.map(c => `<button class="${category === c ? 'active' : ''}" onclick="setCategory('${esc(c)}')">${esc(c)}</button>`).join('');
  }

  function setCategory(c) { category = c; renderCategories(); renderProducts(); }

  function renderProducts() {
    const q = document.getElementById('prodSearch').value.toLowerCase();
    let filtered = products.filter(p => {
      if (category !== 'all' && p.category !== category) return false;
      return !(q && !p.name.toLowerCase().includes(q));
    });
    const grid = document.getElementById('prodGrid');
    if (filtered.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#aeaeb2;">No products</div>'; return; }
    grid.innerHTML = filtered.map(p => `
      <div class="prod-card" onclick="addToCart(${p.id})">
        <div class="img">${p.image_url ? `<img src="${esc(p.image_url)}" alt="">` : '📦'}</div>
        <div class="name">${esc(p.name)}</div>
        <div class="price">$${(+p.price).toFixed(2)}</div>
        ${p.category ? `<div class="cat">${esc(p.category)}</div>` : ''}
      </div>
    `).join('');
  }

  // --- Cart ---
  function addToCart(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    const existing = cart.find(x => x.product_id === id);
    if (existing) existing.quantity++;
    else cart.push({ product_id: id, name: p.name, price: +p.price, quantity: 1 });
    renderCart();
  }

  function updateQty(id, delta) {
    const item = cart.find(x => x.product_id === id);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) cart = cart.filter(x => x.product_id !== id);
    renderCart();
  }

  function clearCart() { cart = []; renderCart(); }

  function renderCart() {
    const el = document.getElementById('cartItems');
    if (cart.length === 0) { el.innerHTML = '<div class="cart-empty">Tap products to add</div>'; }
    else {
      el.innerHTML = cart.map(item => `
        <div class="cart-item">
          <span class="ci-name">${esc(item.name)}</span>
          <span class="ci-price">$${(item.price * item.quantity).toFixed(2)}</span>
          <div class="ci-qty">
            <button onclick="updateQty(${item.product_id}, -1)">−</button>
            <span>${item.quantity}</span>
            <button onclick="updateQty(${item.product_id}, 1)">+</button>
          </div>
        </div>
      `).join('');
    }
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
  }

  async function checkout(method) {
    if (cart.length === 0) return;
    try {
      await api('POST', '/api/pos/orders', { items: cart, payment_method: method });
      cart = [];
      renderCart();
      updateOrderBadge();
    } catch (e) { alert('Checkout failed: ' + e.message); }
  }

  // --- Orders ---
  async function loadOrders() {
    const { data } = await api('GET', '/api/pos/orders');
    orders = data || [];
    updateOrderBadge();
    const el = document.getElementById('ordersList');
    if (orders.length === 0) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#aeaeb2;">No orders yet</div>'; return; }
    el.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="o-header">
          <span>#${o.id} · ${new Date(o.created_at).toLocaleString()}</span>
          <span style="text-transform:capitalize;color:${o.payment_method === 'cash' ? '#34c759' : '#007aff'}">${o.payment_method}</span>
        </div>
        <div class="o-total">$${(+o.total).toFixed(2)}</div>
        <div class="o-items">${formatItems(o.items)}</div>
        <button class="o-del" onclick="deleteOrder(${o.id})">Delete</button>
      </div>
    `).join('');
  }

  function formatItems(items) {
    try { return (typeof items === 'string' ? JSON.parse(items) : items).map(i => `${i.quantity}x ${i.name}`).join(', '); }
    catch { return ''; }
  }

  async function deleteOrder(id) {
    if (!confirm('Delete order #' + id + '?')) return;
    await api('DELETE', '/api/pos/orders/' + id);
    loadOrders(); loadDashboard();
  }

  function updateOrderBadge() { document.getElementById('orderBadge').textContent = orders.length || '0'; }

  // --- Dashboard ---
  async function loadDashboard() {
    const { data } = await api('GET', '/api/pos/dashboard');
    document.getElementById('dashSales').textContent = '$' + (+data.total_sales).toFixed(2);
    document.getElementById('dashOrders').textContent = data.order_count;
    const recent = (data.orders || []).slice(0, 5);
    const el = document.getElementById('dashRecent');
    if (recent.length === 0) { el.innerHTML = '<div style="color:#aeaeb2;">No orders</div>'; return; }
    el.innerHTML = recent.map(o => `
      <div class="order-card">
        <div class="o-header"><span>#${o.id}</span><span style="text-transform:capitalize">${o.payment_method}</span></div>
        <div class="o-total">$${(+o.total).toFixed(2)}</div>
      </div>
    `).join('');
  }

  // --- Products Management ---
  function loadProductsMgmt() {
    const el = document.getElementById('prodMgmtList');
    if (products.length === 0) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#aeaeb2;">No products</div>'; return; }
    el.innerHTML = products.map(p => `
      <div class="order-card">
        <div class="o-header">
          <span><strong>${esc(p.name)}</strong> ${p.category ? '· ' + esc(p.category) : ''}</span>
          <span>$${(+p.price).toFixed(2)}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button style="border:none;background:none;color:#007aff;cursor:pointer;font-size:13px;" onclick="editProduct(${p.id})">Edit</button>
          <button style="border:none;background:none;color:#ff3b30;cursor:pointer;font-size:13px;" onclick="deleteProduct(${p.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  // --- Product Modal with Image Upload ---
  function showProductModal(p) {
    editingProductId = p ? p.id : null;
    document.getElementById('modalTitle').textContent = p ? 'Edit Product' : 'Add Product';
    document.getElementById('prodName').value = p ? p.name : '';
    document.getElementById('prodPrice').value = p ? p.price : '';
    document.getElementById('prodCategory').value = p ? (p.category || '') : '';
    document.getElementById('prodImage').value = p ? (p.image_url || '') : '';
    const preview = document.getElementById('imagePreview');
    if (p && p.image_url) { preview.src = p.image_url; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
    document.getElementById('productModal').classList.add('show');
  }

  function closeProductModal() { document.getElementById('productModal').classList.remove('show'); }

  async function uploadProductImage(input) {
    const file = input.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/files', { method: 'POST', body: fd });
    const { data } = await res.json();
    if (data) {
      document.getElementById('prodImage').value = data.url;
      document.getElementById('imagePreview').src = data.url;
      document.getElementById('imagePreview').style.display = 'block';
    }
    input.value = '';
  }

  async function saveProduct() {
    const name = document.getElementById('prodName').value.trim();
    const price = parseFloat(document.getElementById('prodPrice').value) || 0;
    const category = document.getElementById('prodCategory').value.trim();
    const image_url = document.getElementById('prodImage').value.trim();
    if (!name) { alert('Name is required'); return; }
    const body = { name, price, category, image_url };
    if (editingProductId) await api('PUT', '/api/pos/products/' + editingProductId, body);
    else await api('POST', '/api/pos/products', body);
    closeProductModal();
    await loadProducts();
  }

  function editProduct(id) { const p = products.find(x => x.id === id); if (p) showProductModal(p); }
  async function deleteProduct(id) { if (!confirm('Delete product?')) return; await api('DELETE', '/api/pos/products/' + id); await loadProducts(); }

  // --- Cashier Management ---
  async function saveCashier() {
    const name = document.getElementById('cashierName').value.trim();
    const pin = document.getElementById('cashierPin').value.trim();
    if (!name || pin.length !== 4) { alert('Name and 4-digit PIN required'); return; }
    await api('POST', '/api/pos/cashiers', { name, pin });
    document.getElementById('cashierName').value = '';
    document.getElementById('cashierPin').value = '';
    closeCashierModal();
  }

  function showCashierModal() { document.getElementById('cashierModalTitle').textContent = 'Add Cashier'; document.getElementById('cashierModal').classList.add('show'); }
  function closeCashierModal() { document.getElementById('cashierModal').classList.remove('show'); }

  async function showCashierList() {
    const { data } = await api('GET', '/api/pos/cashiers');
    const el = document.getElementById('cashierListBody');
    el.innerHTML = (data || []).map(c => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f2f2f7;">
        <span><strong>${esc(c.name)}</strong> · ${c.role}</span>
        <span style="color:#aeaeb2;">PIN: ${c.pin}</span>
      </div>
    `).join('') || '<p style="color:#aeaeb2;">No cashiers</p>';
    document.getElementById('cashierListModal').classList.add('show');
  }

  // --- Init ---
  async function init() {
    await loadProducts();
    updateOrderBadge();
    document.getElementById('prodSearch').addEventListener('input', renderProducts);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeProductModal(); closeCashierModal(); } });
    showTutorial();
  }

  // Listen for image URL changes to update preview
  document.getElementById('prodImage').addEventListener('input', function() {
    const preview = document.getElementById('imagePreview');
    if (this.value) { preview.src = this.value; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  });
</script>
</body>
</html>
